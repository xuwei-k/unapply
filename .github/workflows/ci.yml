on:
  pull_request:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
    steps:
    - uses: actions/checkout@v7
    - uses: sbt/setup-sbt@v1
    - uses: actions/setup-java@v5
      with:
        java-version: 17
        distribution: temurin
    - run: sbt -v -J-Xmx6G
           --server
           "scalafixAll --check"
           "all scalafmtCheckAll scalafmtSbtCheck testFull"
  latest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
    steps:
    - uses: actions/checkout@v7
    - uses: sbt/setup-sbt@v1
    - uses: actions/setup-java@v5
      with:
        java-version: 25
        distribution: temurin
    - run: sbt -v -J-Xmx6G
           --server
           '++ 3.8.4!'
           'all unapplyJVM3/testFull unapplyJS3/testFull unapplyNative3/testFull'
